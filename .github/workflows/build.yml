on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: Export Game
    steps:
      - name: install wine & audio deps
        id: wine_install
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine64 wine32 libasound2-dev libpulse-dev pulseaudio
          echo "WINE_PATH=$(which wine)" >> $GITHUB_OUTPUT

      - name: start virtual audio device for FMOD
        run: |
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=virtual_speaker
          pactl set-default-sink virtual_speaker

      - name: checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          # Godot 4.6 stable Linux headless
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          # Project is in v2 subdirectory
          relative_project_path: ./v2
          archive_output: true
          cache: true
          presets_to_export: "DankNoonerLinux, DankNoonerWindows, DankNoonerWeb, DankNoonerMac"
          wine_path: ${{ steps.wine_install.outputs.WINE_PATH }} # set the wine path here which is the output of the wine_install step
      - name: create release
        uses: ncipollo/release-action@v1.18.0
        with:
          # token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*

      - name: extract web build for pages
        run: |
          mkdir -p /tmp/web-pages
          unzip "${{ steps.export.outputs.archive_directory }}/DankNoonerWeb.zip" -d /tmp/web-pages

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/web-pages

  deploy_pages:
    needs: export_game
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
