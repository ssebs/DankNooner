on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: Export ${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: DankNoonerLinux
            needs_wine: false
          - preset: DankNoonerWindows
            needs_wine: true
          - preset: DankNoonerWeb
            needs_wine: false
          - preset: DankNoonerMac
            needs_wine: false
    steps:
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/.ghcup \
                      "$AGENT_TOOLSDIRECTORY"
          df -h /

      # wine is only used to stamp the Windows exe icon/metadata via rcedit
      - name: install wine
        id: wine_install
        if: matrix.needs_wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine64 wine32
          echo "WINE_PATH=$(which wine)" >> $GITHUB_OUTPUT

      - name: checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          # Godot 4.7 stable Linux headless
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          # Project is in v2 subdirectory
          relative_project_path: ./v2
          archive_output: true
          cache: true
          presets_to_export: ${{ matrix.preset }}
          wine_path: ${{ steps.wine_install.outputs.WINE_PATH }}

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.preset }}
          path: ${{ steps.export.outputs.archive_directory }}/*
          retention-days: 1

  create_release:
    needs: export_game
    runs-on: ubuntu-latest
    name: Create Release
    steps:
      - name: download all builds
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: /tmp/builds

      - name: create release
        uses: ncipollo/release-action@v1.18.0
        with:
          # token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          allowUpdates: true
          tag: ${{ github.ref_name }}
          artifacts: /tmp/builds/*

  deploy_pages:
    needs: export_game
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: download web build
        uses: actions/download-artifact@v4
        with:
          name: build-DankNoonerWeb
          path: /tmp/builds

      - name: extract web build for pages
        run: |
          mkdir -p /tmp/web-pages
          unzip /tmp/builds/DankNoonerWeb.zip -d /tmp/web-pages

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/web-pages

      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
